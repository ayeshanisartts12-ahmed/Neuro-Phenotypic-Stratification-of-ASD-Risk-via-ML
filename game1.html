<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>StarWorld Adventure 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --sky:#fff9f0; --cloud:#ffffff; --grass:#8de87a;
  --p1:#ff7eb3; --p2:#ffca3a; --p3:#6bcff6; --p4:#b288ff; --p5:#ff9966;
  --good:#4cd964; --bad:#ff4757; --neutral:#ffca3a;
  --text:#2d2d4e; --muted:#8888aa; --white:#ffffff;
  --r:16px; --r2:28px; --r3:50px;
  --shadow: 0 8px 32px rgba(0,0,0,.12);
  --shadow-lg: 0 16px 48px rgba(0,0,0,.18);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--sky);
  font-family: 'Nunito', sans-serif;
  color: var(--text);
}
body { display: flex; flex-direction: column; }

/* ── STARFIELD BG ── */
#bg-layer {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  overflow: hidden;
}
.bg-cloud {
  position: absolute; border-radius: 50px;
  background: rgba(255,255,255,.65);
  animation: cloudDrift linear infinite;
}
@keyframes cloudDrift {
  from { transform: translateX(-200px); }
  to   { transform: translateX(110vw);  }
}

/* ── HUD ── */
#hud {
  height: 64px; flex-shrink: 0; position: relative; z-index: 50;
  background: linear-gradient(135deg, #ffca3a 0%, #ff7eb3 100%);
  display: flex; align-items: center; padding: 0 1.2rem; gap: .8rem;
  box-shadow: 0 4px 20px rgba(255,126,179,.35);
}
.hud-logo {
  font-family: 'Baloo 2', sans-serif; font-size: 1.05rem; font-weight: 800;
  color: white; text-shadow: 0 2px 8px rgba(0,0,0,.18); letter-spacing: .02em;
  display: flex; align-items: center; gap: .4rem;
}
.hud-logo .star { font-size: 1.3rem; animation: spin 4s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.hud-spacer { flex: 1; }
.hud-stars { display: flex; gap: 5px; align-items: center; }
.star-dot {
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(255,255,255,.3); border: 2px solid rgba(255,255,255,.5);
  transition: all .35s cubic-bezier(.34,1.56,.64,1); font-size: .8rem;
  display: flex; align-items: center; justify-content: center;
}
.star-dot.done { background: white; border-color: white; box-shadow: 0 0 12px rgba(255,255,255,.8); }
.star-dot.done::after { content: '⭐'; font-size: .65rem; }
.star-dot.cur { background: rgba(255,255,255,.6); border-color: white; animation: pulse-dot .9s ease infinite; }
.star-dot.cur::after { content: '✨'; font-size: .65rem; }
@keyframes pulse-dot { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
.hud-friend { font-size: 1.8rem; animation: wobble 2s ease infinite; }
@keyframes wobble { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }

/* ── STAGE ── */
#stage {
  flex: 1; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden; z-index: 1;
}
canvas { display: block; border-radius: 24px; cursor: pointer;
  box-shadow: 0 20px 60px rgba(0,0,0,.15), 0 4px 16px rgba(0,0,0,.08); }

/* ── FLASH ── */
#flash {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  padding: .6rem 2rem; border-radius: 50px; font-size: 1.1rem; font-weight: 800;
  pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 60;
  white-space: nowrap; font-family: 'Baloo 2', sans-serif;
}
#flash.show { opacity: 1; }
#flash.ok  { background: #4cd964; color: white; box-shadow: 0 6px 24px rgba(76,217,100,.5); }
#flash.bad { background: #ff4757; color: white; box-shadow: 0 6px 24px rgba(255,71,87,.5); }

/* ── FLAGS (behavioral) ── */
#flags {
  position: absolute; bottom: 8px; right: 8px; display: flex;
  flex-direction: column; gap: 4px; z-index: 55; pointer-events: none;
}
.flag {
  background: rgba(255,201,38,.12); border: 1.5px solid rgba(255,201,38,.45);
  color: #b8860b; padding: .2rem .65rem; border-radius: 6px;
  font-size: .58rem; font-weight: 700;
}

/* ── COMPLETE ── */
#complete {
  position: absolute; inset: 0; z-index: 70; display: none;
  flex-direction: column; align-items: center; justify-content: flex-start;
  gap: .9rem;
  background: linear-gradient(160deg, #fff9f0 0%, #ffe8f5 50%, #e8f5ff 100%);
  overflow-y: auto;
  padding: 2.5rem 1rem 2rem 1rem;
}
#complete.show { display: flex; }
.complete-hero { font-size: 4rem; animation: bounce-hero 1s ease infinite; }
@keyframes bounce-hero { 0%,100%{transform:translateY(0) scale(1)} 40%{transform:translateY(-14px) scale(1.1)} }
.complete-title { font-family:'Baloo 2',sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--text); }
.risk-pill {
  padding: .5rem 2rem; border-radius: 50px; font-weight: 800;
  font-size: .9rem; font-family: 'Baloo 2', sans-serif;
}
.risk-Low     { background: rgba(76,217,100,.15); color: #2a8a3a; border: 2px solid rgba(76,217,100,.4); }
.risk-Moderate{ background: rgba(255,201,38,.15); color: #8a6a00; border: 2px solid rgba(255,201,38,.4); }
.risk-High    { background: rgba(255,71,87,.12); color: #aa2030; border: 2px solid rgba(255,71,87,.35); }
.score-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: .5rem;
  width: min(380px, 90vw);
}
.score-item {
  background: white; border-radius: 16px; padding: .75rem 1rem;
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
}
.score-lbl { font-size: .6rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: .3rem; font-weight: 700; }
.score-bar-wrap { height: 5px; background: #f0f0f5; border-radius: 3px; overflow: hidden; margin-bottom: .3rem; }
.score-bar { height: 100%; border-radius: 3px; transition: width 1.2s cubic-bezier(.22,1,.36,1); }
.score-val { font-size: .85rem; font-weight: 800; }
.flag-list { max-width: 380px; display: flex; flex-direction: column; gap: .3rem; }
.complete-flag { font-size: .68rem; color: #8a6a00; background: rgba(255,201,38,.08); border: 1.5px solid rgba(255,201,38,.3); border-radius: 8px; padding: .25rem .75rem; }
.note { font-size: .58rem; color: var(--muted); text-align: center; max-width: 340px; line-height: 1.6; }

/* ── MUSIC TOGGLE BUTTON ── */
#music-btn {
  position: relative; z-index: 60;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,.3);
  border: 2.5px solid rgba(255,255,255,.6);
  cursor: pointer; font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center;
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(0,0,0,.12);
}
#music-btn:hover { transform: scale(1.15); background: rgba(255,255,255,.5); }
#music-btn.muted { opacity: .55; }

/* ── MUSIC POPUP TOAST ── */
#music-toast {
  position: absolute;
  top: 12px; left: 50%; transform: translateX(-50%) translateY(-8px);
  background: linear-gradient(135deg, #fff9f0, #ffe8f8);
  border: 2.5px solid var(--toast-col, #ff7eb3);
  border-radius: 28px;
  padding: .55rem 1.4rem .55rem 1rem;
  display: flex; align-items: center; gap: .6rem;
  font-family: 'Baloo 2', sans-serif; font-weight: 800;
  font-size: .95rem; color: var(--text);
  pointer-events: none;
  opacity: 0;
  box-shadow: 0 8px 28px rgba(0,0,0,.14);
  z-index: 65;
  white-space: nowrap;
  transition: opacity .28s, transform .28s cubic-bezier(.34,1.56,.64,1);
}
#music-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
#music-toast .toast-icon {
  font-size: 1.5rem;
  animation: toast-bounce .5s ease infinite alternate;
}
#music-toast .toast-notes {
  font-size: .75rem; color: #aaa;
  display: flex; gap: 3px; align-items: center;
}
.note-dot {
  width: 6px; height: 6px; border-radius: 50%;
  animation: note-pulse 1s ease infinite;
}
.note-dot:nth-child(2) { animation-delay: .15s; }
.note-dot:nth-child(3) { animation-delay: .30s; }
@keyframes note-pulse { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(2.2)} }
@keyframes toast-bounce { from{transform:translateY(0)} to{transform:translateY(-3px)} }

/* ── MUSIC BARS (visualizer in HUD) ── */
#music-bars {
  display: flex; gap: 3px; align-items: flex-end; height: 20px;
  opacity: 0; transition: opacity .3s;
}
#music-bars.active { opacity: 1; }
#music-bars span {
  width: 4px; background: rgba(255,255,255,.8); border-radius: 2px;
  animation: bar-dance 0.6s ease infinite alternate;
}
#music-bars span:nth-child(1){ height:8px;  animation-delay:0s; }
#music-bars span:nth-child(2){ height:16px; animation-delay:.1s; }
#music-bars span:nth-child(3){ height:12px; animation-delay:.2s; }
#music-bars span:nth-child(4){ height:18px; animation-delay:.05s; }
#music-bars span:nth-child(5){ height:10px; animation-delay:.15s; }
@keyframes bar-dance {
  from { transform: scaleY(1); opacity:.7; }
  to   { transform: scaleY(1.8); opacity:1; }
}

  /* ── FINAL BUTTONS ── */
  .final-actions {
    display: flex; gap: .7rem; flex-wrap: wrap;
    justify-content: center; margin-top: .6rem; margin-bottom: 2rem;
    max-width: 560px; width: 90vw;
  }
  .final-actions .btn {
    flex: 1 1 140px; min-width: 140px;
    padding: .7rem 1.2rem; border-radius: 50px;
    font-family: 'Baloo 2', sans-serif; font-weight: 800;
    font-size: .92rem; letter-spacing: .02em;
    cursor: pointer; border: none; text-decoration: none;
    display: inline-flex; align-items: center; justify-content: center;
    gap: .35rem; transition: all .25s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 4px 14px rgba(0,0,0,.12);
    color: white; text-align: center;
  }
  .final-actions .btn:hover { transform: translateY(-3px) scale(1.04); }
  .btn-download { background: linear-gradient(135deg, #4cd964, #34c759); }
  .btn-download:hover { box-shadow: 0 8px 24px rgba(76,217,100,.45); }
  .btn-dashboard { background: linear-gradient(135deg, #6bcff6, #4aa8e8); }
  .btn-dashboard:hover { box-shadow: 0 8px 24px rgba(107,207,246,.45); }
  .btn-doctor { background: linear-gradient(135deg, #ff7eb3, #ff5e9e); }
  .btn-doctor:hover { box-shadow: 0 8px 24px rgba(255,126,179,.45); }
</style>
<base target="_blank">

<script>
'use strict';

// ══════════════════════════════════════════════════
// 🎵 MUSIC ENGINE v3 — True step sequencer
//
// How it works:
//   • ONE AudioContext, ONE masterGain
//   • THREE buses: melodyBus (vol 0.17), bassBus (vol 0.08), sfxBus (vol 0.24)
//   • TWO independent voice cursors: melody cursor + bass cursor
//     Each cursor holds: noteIndex, nextScheduleTime
//   • setInterval fires every TICK_MS (50ms)
//     On each tick, for each voice:
//       → if nextScheduleTime < now + AHEAD_SEC  →  fire THAT ONE note, advance cursor
//     This fires at most one note per voice per tick — never a burst.
//   • Loop: when a cursor reaches end of its array, it wraps to 0
//     and nextScheduleTime advances by the note duration (not reset to "now").
//     This ensures perfectly gapless, perfectly non-overlapping loops.
//   • SFX always go to sfxBus — completely isolated from music voices.
//   • stopCurrent() cancels the interval and ramps out all active oscs
//     with a 40ms fade to prevent clicks.
// ══════════════════════════════════════════════════
const MusicEngine = (() => {

  // ── Audio graph ──────────────────────────────────
  let AC         = null;
  let masterGain = null;
  let melodyBus  = null;   // vol 0.17 — melody voice
  let bassBus    = null;   // vol 0.08 — bass voice
  let sfxBus     = null;   // vol 0.24 — sfx only

  function _initAC() {
    if (AC) return;
    AC = new (window.AudioContext || window.webkitAudioContext)();

    masterGain = AC.createGain();
    masterGain.gain.value = 1;
    masterGain.connect(AC.destination);

    melodyBus = AC.createGain(); melodyBus.gain.value = 0.17;
    bassBus   = AC.createGain(); bassBus.gain.value   = 0.08;
    sfxBus    = AC.createGain(); sfxBus.gain.value    = 0.24;
    melodyBus.connect(masterGain);
    bassBus.connect(masterGain);
    sfxBus.connect(masterGain);
  }

  // ── Freq table ───────────────────────────────────
  const F = {
    C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196.00,A3:220.00,B3:246.94,
    C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,
    C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880.00,B5:987.77,
    R:0,
  };

  // ── Themes ───────────────────────────────────────
  // mel[] and bas[] are note arrays: [noteName, beatDuration]
  // beatDuration is in quarter-note beats (1 = 1 quarter note).
  // Melody and bass loop independently — each wraps at its own end.
  // They share the same BPM so they stay in sync naturally.
  //
  // RULE: no note shorter than 0.25 beats (prevents rapid-fire bursts).
  const THEMES = [

    // Game 0 · Emotion Bubbles · Gentle waltz in C major
    { name:'Feeling Fiesta', icon:'🎭', color:'#ffca3a', bpm:104,
      melWave:'sine', basWave:'sine',
      mel:[
        ['E5',.5],['G5',.5],['A5',1],
        ['G5',.5],['E5',.5],['C5',1],
        ['D5',.5],['F5',.5],['G5',1],
        ['E5',.5],['D5',.5],['C5',1],
        ['A4',.5],['C5',.5],['E5',1],
        ['G4',.5],['B4',.5],['D5',1],
        ['E5',.5],['G5',.5],['E5',.5],['G5',.5],
        ['C5',2],
      ],
      bas:[
        ['C3',2],['G3',2],['A3',2],['E3',2],
        ['F3',2],['C3',2],['G3',2],['G3',2],
      ],
    },

    // Game 1 · Decorate Room · Happy skipping
    { name:'Room Remix', icon:'🏠', color:'#b288ff', bpm:96,
      melWave:'triangle', basWave:'sine',
      mel:[
        ['C5',.5],['E5',.5],['G5',.5],['E5',.5],
        ['D5',.5],['F5',.5],['A5',1],
        ['G5',.5],['E5',.5],['C5',.5],['E5',.5],
        ['D5',.5],['B4',.5],['C5',1],
        ['E5',.5],['G5',.5],['E5',.5],['D5',.5],
        ['C5',.5],['A4',.5],['G4',1],
        ['A4',.5],['C5',.5],['E5',.5],['G5',.5],
        ['C5',2],
      ],
      bas:[
        ['C3',2],['G3',2],['F3',2],['G3',2],
        ['A3',2],['E3',2],['F3',2],['C3',2],
      ],
    },

    // Game 2 · Sort Objects · Bouncy march
    { name:'Sorting Shuffle', icon:'🌈', color:'#ff7eb3', bpm:116,
      melWave:'triangle', basWave:'sine',
      mel:[
        ['G4',.5],['A4',.5],['G4',.5],['R',.5],
        ['C5',.5],['B4',1],  ['R',.5],
        ['G4',.5],['A4',.5],['G4',.5],['R',.5],
        ['D5',.5],['C5',1],  ['R',.5],
        ['G4',.5],['G5',.5],['E5',.5],['C5',.5],
        ['B4',.5],['A4',1],  ['R',.5],
        ['F5',.5],['E5',.5], ['D5',.5],['C5',.5],
        ['C5',2],
      ],
      bas:[
        ['C3',2],['C3',2],['G3',2],['G3',2],
        ['F3',2],['F3',2],['G3',2],['G3',2],
      ],
    },

    // Game 3 · Joint Attention · Curious explorer (Ode to Joy base)
    { name:'Explorer Beat', icon:'👁️', color:'#6bcff6', bpm:108,
      melWave:'sine', basWave:'sine',
      mel:[
        ['E5',.5],['E5',.5],['F5',.5],['G5',.5],
        ['G5',.5],['F5',.5],['E5',.5],['D5',.5],
        ['C5',.5],['C5',.5],['D5',.5],['E5',.5],
        ['E5',1], ['D5',1],
        ['E5',.5],['E5',.5],['F5',.5],['G5',.5],
        ['G5',.5],['F5',.5],['E5',.5],['D5',.5],
        ['C5',.5],['D5',.5],['E5',.5],['C5',.5],
        ['C5',2],
      ],
      bas:[
        ['A3',2],['E3',2],['F3',2],['E3',2],
        ['A3',2],['E3',2],['D3',2],['A3',2],
      ],
    },

    // Game 4 · Color Patterns · Bright arpeggio dance
    { name:'Rainbow Rave', icon:'🎨', color:'#4cd964', bpm:112,
      melWave:'triangle', basWave:'sine',
      mel:[
        ['C5',.25],['E5',.25],['G5',.25],['E5',.25],
        ['C5',.25],['G5',.25],['E5',.25],['C5',.25],
        ['D5',.25],['F5',.25],['A5',.25],['F5',.25],
        ['D5',.25],['A5',.25],['F5',.25],['D5',.25],
        ['E5',.5], ['G5',.5], ['C5',.5], ['E5',.5],
        ['G5',.5], ['A5',.5], ['G5',1],
        ['F5',.25],['E5',.25],['D5',.25],['C5',.25],
        ['E5',.5], ['G5',.5], ['C5',1],
      ],
      bas:[
        ['C3',2],['G3',2],['A3',2],['F3',2],
        ['G3',2],['D3',2],['F3',2],['C3',2],
      ],
    },

    // Game 5 · Focus Quest · Hero march
    { name:'Hero Quest', icon:'🎯', color:'#ff9966', bpm:120,
      melWave:'triangle', basWave:'sine',
      mel:[
        ['C5',.5],['C5',.5],['E5',.5],['G5',.5],
        ['G5',.5],['F5',.5],['E5',.5],['D5',.5],
        ['D5',.5],['D5',.5],['F5',.5],['A5',.5],
        ['A5',.5],['G5',.5],['F5',.5],['E5',.5],
        ['E5',.5],['C5',.5],['E5',.5],['G5',.5],
        ['G5',.5],['E5',.5],['C5',.5],['E5',.5],
        ['D5',.5],['F5',.5],['D5',.5],['B4',.5],
        ['C5',2],
      ],
      bas:[
        ['C3',2],['G3',2],['C3',2],['G3',2],
        ['F3',2],['C3',2],['G3',2],['C3',2],
      ],
    },
  ];

  // ── State ────────────────────────────────────────
  let muted     = false;
  let curGame   = -1;
  let tickTimer = null;

  // Voice cursors — each tracks its own position independently
  const mel = { i:0, nextT:0, arr:[], wave:'sine',  bus:null, octave:1   };
  const bas = { i:0, nextT:0, arr:[], wave:'sine',  bus:null, octave:0.5 };

  const TICK_MS  = 50;    // scheduler fires every 50ms
  const AHEAD_S  = 0.18;  // schedule this many seconds ahead of "now"

  // ── Fire one note on a bus ────────────────────────
  // Clean ADSR: 10ms attack → sustain → 20ms release
  // noteLen = full grid slot in seconds
  // Sound occupies 82% of slot, leaving an 18% gap (articulation)
  function _note(freq, startT, noteLen, wave, bus) {
    if (!AC || freq <= 0 || !bus) return;
    const soundLen = noteLen * 0.82;
    const atk = Math.min(0.010, soundLen * 0.15);
    const rel = Math.min(0.020, soundLen * 0.20);
    const susEnd = startT + soundLen - rel;

    const osc  = AC.createOscillator();
    const gain = AC.createGain();
    osc.type            = wave;
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0, startT);
    gain.gain.linearRampToValueAtTime(1, startT + atk);
    gain.gain.setValueAtTime(1, susEnd);
    gain.gain.linearRampToValueAtTime(0, susEnd + rel);

    osc.connect(gain);
    gain.connect(bus);
    osc.start(startT);
    osc.stop(susEnd + rel + 0.005);
  }

  // ── Sequencer tick ───────────────────────────────
  // Called every TICK_MS.
  // For EACH voice: while its nextT is within the lookahead window,
  // fire that note and advance the cursor by exactly the note duration.
  // Wrapping is additive (nextT += dur) so loops are seamless.
  function _tick() {
    if (!AC || muted) return;
    const now     = AC.currentTime;
    const horizon = now + AHEAD_S;
    const beat    = 60 / (THEMES[curGame] || THEMES[0]).bpm;

    for (const voice of [mel, bas]) {
      while (voice.nextT < horizon) {
        const [noteName, beats] = voice.arr[voice.i];
        const durSec = beats * beat;
        const freq   = (F[noteName] || 0) * voice.octave;
        _note(freq, voice.nextT, durSec, voice.wave, voice.bus);
        voice.nextT += durSec;                   // advance by exact duration
        voice.i = (voice.i + 1) % voice.arr.length;  // wrap at end of array
      }
    }
  }

  // ── Start / stop ─────────────────────────────────
  function _stopEngine() {
    if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }
    // Fade out both music buses fast to avoid clicks
    if (AC) {
      const now = AC.currentTime;
      [melodyBus, bassBus].forEach(bus => {
        if (!bus) return;
        bus.gain.cancelScheduledValues(now);
        bus.gain.setValueAtTime(bus.gain.value, now);
        bus.gain.linearRampToValueAtTime(0, now + 0.05);
        // Restore after fade so next playGame works
        setTimeout(() => {
          if (bus === melodyBus) bus.gain.value = 0.17;
          if (bus === bassBus)   bus.gain.value = 0.08;
        }, 100);
      });
    }
    _updateBars(false);
  }

  function playGame(idx) {
    if (!AC) _initAC();
    if (AC.state === 'suspended') AC.resume();
    _stopEngine();
    if (muted) { _showToast(idx); return; }

    curGame = idx;
    const th = THEMES[idx] || THEMES[0];

    // Point each voice at its data
    mel.arr   = th.mel;  mel.wave = th.melWave; mel.bus = melodyBus; mel.octave = 1;
    bas.arr   = th.bas;  bas.wave = th.basWave;  bas.bus = bassBus;   bas.octave = 0.5;
    mel.i = 0; bas.i = 0;

    // Both voices start at a small offset from now so first tick has time
    const startT  = AC.currentTime + 0.06;
    mel.nextT = startT;
    bas.nextT = startT;

    // Restore bus volumes (may have been faded by _stopEngine)
    melodyBus.gain.cancelScheduledValues(startT);
    bassBus.gain.cancelScheduledValues(startT);
    melodyBus.gain.setValueAtTime(0.17, startT);
    bassBus.gain.setValueAtTime(0.08, startT);

    _tick();  // fire immediately so notes are ready before interval
    tickTimer = setInterval(_tick, TICK_MS);

    _showToast(idx);
    _updateBars(true);
  }

  function stopCurrent() { _stopEngine(); }

  // ── SFX ──────────────────────────────────────────
  // All SFX use sfxBus exclusively.
  // Timing is relative to AC.currentTime + tiny offset.
  // Max 4 simultaneous SFX oscillators — never more.
  function sfx(type) {
    if (!AC || muted) return;
    if (AC.state === 'suspended') AC.resume();
    const t = AC.currentTime + 0.01;

    if (type === 'correct') {
      // 3-note ascending chime — one note every 100ms
      _note(F.C5, t,        0.12, 'sine', sfxBus);
      _note(F.E5, t + 0.10, 0.12, 'sine', sfxBus);
      _note(F.G5, t + 0.20, 0.18, 'sine', sfxBus);

    } else if (type === 'wrong') {
      // Soft 2-note dip — gentle, not alarming for kids
      _note(F.A4, t,        0.10, 'sine', sfxBus);
      _note(F.F4, t + 0.10, 0.14, 'sine', sfxBus);

    } else if (type === 'start') {
      // 4-note upward fanfare — evenly spaced 90ms
      _note(F.C4, t,        0.10, 'triangle', sfxBus);
      _note(F.E4, t + 0.09, 0.10, 'triangle', sfxBus);
      _note(F.G4, t + 0.18, 0.10, 'triangle', sfxBus);
      _note(F.C5, t + 0.27, 0.20, 'triangle', sfxBus);

    } else if (type === 'complete') {
      // Victory arpeggio — 4 notes, 120ms apart
      _note(F.C5,     t,        0.14, 'triangle', sfxBus);
      _note(F.E5,     t + 0.12, 0.14, 'triangle', sfxBus);
      _note(F.G5,     t + 0.24, 0.14, 'triangle', sfxBus);
      _note(F.C5 * 2, t + 0.36, 0.28, 'triangle', sfxBus);

    } else if (type === 'tap') {
      // Single soft ping
      _note(F.A5, t, 0.05, 'sine', sfxBus);

    } else if (type === 'drag') {
      // Soft low pickup tick
      _note(F.G4, t, 0.04, 'sine', sfxBus);

    } else if (type === 'drop') {
      // Two-note plop — 60ms apart
      _note(F.E5, t,        0.07, 'triangle', sfxBus);
      _note(F.G5, t + 0.06, 0.09, 'triangle', sfxBus);
    }
  }

  // ── Toast popup ──────────────────────────────────
  function _showToast(idx) {
    const th    = THEMES[idx] || THEMES[0];
    const toast = document.getElementById('music-toast');
    const ti    = document.getElementById('toast-icon');
    const tt    = document.getElementById('toast-title');
    if (!toast) return;
    toast.style.borderColor = th.color;
    if (ti) ti.textContent = th.icon;
    if (tt) tt.textContent = '🎵 ' + th.name;
    toast.querySelectorAll('.note-dot').forEach(d => d.style.background = th.color);
    toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toast.classList.remove('show'), 2800);
  }

  // ── HUD visualizer bars ───────────────────────────
  function _updateBars(on) {
    const bars = document.getElementById('music-bars');
    if (bars) bars.classList.toggle('active', on && !muted);
  }

  // ── Mute toggle ──────────────────────────────────
  function _toggleMute() {
    if (!AC) _initAC();
    muted = !muted;
    if (masterGain) {
      masterGain.gain.cancelScheduledValues(AC.currentTime);
      masterGain.gain.linearRampToValueAtTime(muted ? 0 : 1, AC.currentTime + 0.08);
    }
    const btn = document.getElementById('music-btn');
    if (btn) { btn.textContent = muted ? '🔇' : '🎵'; btn.classList.toggle('muted', muted); }
    _updateBars(!muted);
    if (!muted && curGame >= 0) playGame(curGame);
    else if (muted) _stopEngine();
  }

  // ── Init / wire button ────────────────────────────
  function init() { _initAC(); }

  document.getElementById('music-btn')?.addEventListener('click', () => {
    _toggleMute();
    if (!muted) sfx('tap');
  });

  return { init, playGame, stopCurrent, sfx };
})();

// ══ Pointer ══════════════════════════════════════
let _clickCb = null, _drag = {};
function getXY(e) {
  const r = canvas.getBoundingClientRect();
  const sc = W / r.width;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - r.left) * sc, y: (src.clientY - r.top) * (H / r.height) };
}
canvas.addEventListener('pointerdown', e => { if (_clickCb) _clickCb(getXY(e)); if (_drag.down) _drag.down(getXY(e)); });
canvas.addEventListener('pointermove', e => {
  if (_drag.move) _drag.move(getXY(e));
  if (_hoverFn)   _hoverFn(getXY(e));
});
canvas.addEventListener('pointerup', e => { if (_drag.up) _drag.up(getXY(e)); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); if (_clickCb) _clickCb(getXY(e)); if (_drag.down) _drag.down(getXY(e)); }, {passive:false});
canvas.addEventListener('touchmove',  e => { e.preventDefault(); if (_drag.move) _drag.move(getXY(e)); if (_hoverFn) _hoverFn(getXY(e)); }, {passive:false});
canvas.addEventListener('touchend',   e => { e.preventDefault(); if (_drag.up) _drag.up(getXY(e)); }, {passive:false});
let _hoverFn = null;
function setHover(fn)  { _hoverFn = fn; }
function clearHover()  { _hoverFn = null; }
function setClick(fn)  { _clickCb = fn; }
function clearClick()  { _clickCb = null; }
function setDrag(d,m,u){ _drag = {down:d, move:m, up:u}; }
function clearDrag()   { _drag = {}; }
const wait = ms => new Promise(r => setTimeout(r, ms));

// ══ Loop ═════════════════════════════════════════
function loop(fn) {
  let t = 0, alive = true, id;
  (function tick() { if (!alive) return; fn(t++); id = requestAnimationFrame(tick); })();
  return () => { alive = false; cancelAnimationFrame(id); };
}

// ══ Particles ════════════════════════════════════
const particles = [];
function burst(x, y, col, n = 16) {
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2;
    const spd = 3 + Math.random() * 7;
    particles.push({
      x, y, vx: Math.cos(a) * spd * (.5 + Math.random()),
      vy: Math.sin(a) * spd - 2, r: 3 + Math.random() * 4,
      col, life: 1, dec: .02 + Math.random() * .02,
    });
  }
}
function burstEmoji(x, y, emojis, n = 8) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y, vx: (Math.random()-0.5)*12, vy: -(2+Math.random()*8),
      emoji: emojis[i % emojis.length], life: 1, dec: .016 + Math.random()*0.014,
      r: 16 + Math.random()*8,
    });
  }
}
function tickParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += .35; p.life -= p.dec;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.save(); ctx.globalAlpha = p.life * p.life;
    if (p.emoji) {
      ctx.font = p.r + 'px serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(p.emoji, p.x, p.y);
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
      ctx.fillStyle = p.col; ctx.fill();
    }
    ctx.restore();
  }
}

// ══ Drawing helpers ═══════════════════════════════
function bg() {
  // Sky gradient background
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, '#e8f4ff');
  g.addColorStop(.6, '#fff9f0');
  g.addColorStop(1, '#e8f9e8');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  // Grass strip
  ctx.fillStyle = '#b8edaa';
  ctx.fillRect(0, H-60, W, 60);
  ctx.fillStyle = '#8de87a';
  ctx.fillRect(0, H-56, W, 8);

  // Decorative sun
  ctx.save(); ctx.globalAlpha = .25;
  ctx.beginPath(); ctx.arc(W-80, 80, 55, 0, Math.PI*2);
  ctx.fillStyle = '#ffca3a'; ctx.fill();
  ctx.restore();
}
function rr(x, y, w, h, r, fill, stroke, lw=2) {
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r);
  if (fill)  { ctx.fillStyle=fill; ctx.fill(); }
  if (stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=lw; ctx.stroke(); }
}
function circ(x, y, r, fill, stroke, lw=2) {
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  if (fill)  { ctx.fillStyle=fill; ctx.fill(); }
  if (stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=lw; ctx.stroke(); }
}
function txt(s, x, y, col='#2d2d4e', sz=16, wt='700', align='center') {
  ctx.save(); ctx.font=wt+' '+sz+'px "Nunito",sans-serif';
  ctx.fillStyle=col; ctx.textAlign=align; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,.08)'; ctx.shadowBlur=4;
  ctx.fillText(s, x, y); ctx.restore();
}
function bigTxt(s, x, y, sz=22, col='#2d2d4e') {
  ctx.save(); ctx.font='800 '+sz+'px "Baloo 2",sans-serif';
  ctx.fillStyle=col; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,.1)'; ctx.shadowBlur=6;
  ctx.fillText(s, x, y); ctx.restore();
}
function etxt(s, x, y, sz=36) {
  ctx.save(); ctx.font=sz+'px serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(s, x, y); ctx.restore();
}
function glow(x, y, r, col, t, lw=4) {
  ctx.save(); ctx.globalAlpha=.25+.15*Math.sin(t*.1);
  ctx.beginPath(); ctx.arc(x, y, r*(1+.04*Math.sin(t*.08)), 0, Math.PI*2);
  ctx.strokeStyle=col; ctx.lineWidth=lw; ctx.stroke(); ctx.restore();
}

// ── Smiley face helper ──
const FC = {happy:'#ffca3a', sad:'#6bcff6', angry:'#ff7eb3', scared:'#b288ff',
            excited:'#ff9966', disgusted:'#4cd964', surprised:'#ff7eb3', neutral:'#c0bcd8'};
function face(cx, cy, r, emotion) {
  const col = FC[emotion] || '#ffca3a';
  // Shadow
  ctx.save(); ctx.globalAlpha=.15;
  circ(cx+4, cy+6, r, '#000', null); ctx.restore();
  // Body
  circ(cx, cy, r, col, '#fff', 3);
  // Eyes
  const er = r * .14;
  circ(cx - r*.3, cy - r*.1, er, '#2d2d4e', null);
  circ(cx + r*.3, cy - r*.1, er, '#2d2d4e', null);
  // Eye shine
  circ(cx - r*.25, cy - r*.15, er*.35, '#fff', null);
  circ(cx + r*.35, cy - r*.15, er*.35, '#fff', null);
  // Mouth
  ctx.strokeStyle='#2d2d4e'; ctx.lineWidth=r*.07; ctx.lineCap='round';
  if (emotion==='happy'||emotion==='excited') {
    ctx.beginPath(); ctx.arc(cx, cy+r*.1, r*.35, .15, Math.PI-.15); ctx.stroke();
    // rosy cheeks
    ctx.save(); ctx.globalAlpha=.25;
    circ(cx-r*.44, cy+r*.1, r*.18, '#ff9999', null);
    circ(cx+r*.44, cy+r*.1, r*.18, '#ff9999', null); ctx.restore();
  } else if (emotion==='sad'||emotion==='scared') {
    ctx.beginPath(); ctx.arc(cx, cy+r*.55, r*.3, Math.PI+.2, -.2); ctx.stroke();
    // Tears
    ctx.fillStyle='#6bcff6';
    ctx.beginPath(); ctx.ellipse(cx-r*.3, cy+r*.32, 3, 5, 0, 0, Math.PI*2); ctx.fill();
  } else if (emotion==='angry') {
    ctx.beginPath(); ctx.moveTo(cx-r*.3, cy+r*.28); ctx.lineTo(cx+r*.3, cy+r*.28); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-r*.42,cy-r*.28); ctx.lineTo(cx-r*.14,cy-r*.18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+r*.14,cy-r*.18); ctx.lineTo(cx+r*.42,cy-r*.28); ctx.stroke();
  } else if (emotion==='surprised') {
    circ(cx, cy+r*.22, r*.16, '#2d2d4e', null);
    circ(cx-r*.3, cy-r*.1, er*1.3, '#2d2d4e', null);
    circ(cx+r*.3, cy-r*.1, er*1.3, '#2d2d4e', null);
  } else {
    ctx.beginPath(); ctx.moveTo(cx-r*.3, cy+r*.22); ctx.lineTo(cx+r*.3, cy+r*.22); ctx.stroke();
  }
}

// ── Start button ──
function drawStart(t, label='▶  Let\'s Play!') {

// ── Progress dots ──
function drawProgress(cur, tot, col='#ff7eb3') {

    ctx.globalAlpha = done ? 1 : .25;

}
